batch_id: batch_004_dev
description: "Dev-only standalone loop checkpoint probes after tightened acceptance policy."
created_by: codex
purpose: dev
primary_metric: ndcg_at_10
win_margin: 0.001

baseline:
  summary_csv: outputs/baselines/standard_frozen/results_summary.csv
  manifest_json: outputs/baselines/standard_frozen/baseline_manifest.json

budget:
  max_concurrent_gpu_jobs: 4
  max_gpu_hours_estimate: 20
  allow_submit: true

tasks:
  dev:
    - SciFact
    - NFCorpus
    - FiQA2018
    - SCIDOCS
  final:
    - SciFact
    - NFCorpus
    - SCIDOCS
    - FiQA2018
    - ArguAna
    - Touche2020
    - TRECCOVID

defaults:
  config: configs/preexp.yaml
  output_base: outputs/goal/runs
  eval_output_base: outputs/goal/eval
  eval_all_loops: false

experiments:
  - run_id: r004_standalone_loop_matryoshka_t2
    claim_track: standalone_main
    hypothesis: "A fixed standalone loop_matryoshka loop-2 embedding may provide useful dev-task retrieval signal without any frozen-baseline fusion."
    mechanism: "Evaluation-only scoring from the loop_matryoshka checkpoint at one predeclared loop depth."
    expected_effect: "Measures whether shallow loopwise supervision is viable as an independent candidate pipeline on the dev retrieval tasks."
    version: loop_matryoshka
    eval_only: true
    candidate_rule: "Use loop_idx=2 for every dev task; do not ensemble, concatenate, or interpolate with any frozen-baseline model."
    expected_failure_modes:
      - "The standalone loop representation may underperform the frozen baseline without a fusion component."
      - "A shallow fixed depth may not capture enough query refinement for all dev tasks."
    eval:
      checkpoint_dir: outputs/final_grid_experiment/checkpoints/loop_matryoshka_mean_pool
      task_names:
        - SciFact
        - NFCorpus
        - FiQA2018
        - SCIDOCS
      eval_all_loops: false
      loop_idx: 2
      candidate_loop_indices:
        - 2
    risk:
      level: low
      reason: "Dev-only eval of an existing checkpoint with a fixed global loop depth and no frozen-baseline scoring input."
    estimated_gpu_hours: 4
    fallback: "Treat as standalone dev evidence only; do not make a final claim."

  - run_id: r004_standalone_loop_matryoshka_t3
    claim_track: standalone_main
    hypothesis: "A fixed standalone loop_matryoshka loop-3 embedding is a direct non-fusion counterpart to the strongest prior dev-only loop-depth signal."
    mechanism: "Evaluation-only scoring from the loop_matryoshka checkpoint at one predeclared loop depth."
    expected_effect: "Tests whether the loop-3 signal remains useful when the candidate pipeline scores independently."
    version: loop_matryoshka
    eval_only: true
    candidate_rule: "Use loop_idx=3 for every dev task; do not ensemble, concatenate, or interpolate with any frozen-baseline model."
    expected_failure_modes:
      - "The standalone loop-3 embedding may not preserve enough baseline ranking quality."
      - "A single fixed depth may help some dev tasks but not all dev tasks."
    eval:
      checkpoint_dir: outputs/final_grid_experiment/checkpoints/loop_matryoshka_mean_pool
      task_names:
        - SciFact
        - NFCorpus
        - FiQA2018
        - SCIDOCS
      eval_all_loops: false
      loop_idx: 3
      candidate_loop_indices:
        - 3
    risk:
      level: low
      reason: "Dev-only eval of an existing checkpoint with one fixed loop depth and no frozen-baseline scoring input."
    estimated_gpu_hours: 4
    fallback: "Treat as standalone dev evidence only; do not make a final claim."

  - run_id: r004_standalone_loop_matryoshka_t4
    claim_track: standalone_main
    hypothesis: "A fixed standalone loop_matryoshka loop-4 embedding may reveal whether one additional loop step improves dev retrieval without fusion."
    mechanism: "Evaluation-only scoring from the loop_matryoshka checkpoint at one predeclared loop depth."
    expected_effect: "Checks the local loop-depth neighborhood around the prior dev signal while keeping one global rule per candidate."
    version: loop_matryoshka
    eval_only: true
    candidate_rule: "Use loop_idx=4 for every dev task; do not ensemble, concatenate, or interpolate with any frozen-baseline model."
    expected_failure_modes:
      - "Additional loop steps may drift away from retrieval-useful representations."
      - "A deeper fixed loop may improve one dev task while hurting another."
    eval:
      checkpoint_dir: outputs/final_grid_experiment/checkpoints/loop_matryoshka_mean_pool
      task_names:
        - SciFact
        - NFCorpus
        - FiQA2018
        - SCIDOCS
      eval_all_loops: false
      loop_idx: 4
      candidate_loop_indices:
        - 4
    risk:
      level: low
      reason: "Dev-only eval of an existing checkpoint with one fixed loop depth and no frozen-baseline scoring input."
    estimated_gpu_hours: 4
    fallback: "Treat as standalone dev evidence only; do not make a final claim."

  - run_id: r004_standalone_recurrent_matryoshka_t3
    claim_track: standalone_main
    hypothesis: "A fixed standalone recurrent-query loop_matryoshka loop-3 embedding may provide an independent contrast to the default query-update mode."
    mechanism: "Evaluation-only scoring from the registered recurrent mean-pool loop_matryoshka checkpoint at one predeclared loop depth."
    expected_effect: "Tests an existing standalone registered variant on the same dev tasks without changing training or scoring semantics."
    version: loop_matryoshka_recurrent_mean_pool
    eval_only: true
    candidate_rule: "Use loop_idx=3 for every dev task; do not ensemble, concatenate, or interpolate with any frozen-baseline model."
    expected_failure_modes:
      - "Recurrent query hidden states may over-refine query representations on short retrieval queries."
      - "The registered recurrent checkpoint may not improve dev-task NDCG@10 as a standalone scorer."
    eval:
      checkpoint_dir: outputs/final_grid_experiment/checkpoints/loop_matryoshka_recurrent_mean_pool
      task_names:
        - SciFact
        - NFCorpus
        - FiQA2018
        - SCIDOCS
      eval_all_loops: false
      loop_idx: 3
      candidate_loop_indices:
        - 3
    risk:
      level: low
      reason: "Dev-only eval of an existing registered checkpoint with one fixed loop depth and no frozen-baseline scoring input."
    estimated_gpu_hours: 4
    fallback: "Treat as standalone dev evidence only; do not make a final claim."
