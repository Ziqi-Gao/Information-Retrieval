batch_id: batch_010_dev
description: "Dev-only standalone portfolio for loop-loss weighting, loop consistency, and candidate self-residual query stabilization."
created_by: codex
purpose: dev
primary_metric: ndcg_at_10
win_margin: 0.001

baseline:
  summary_csv: outputs/baselines/standard_frozen/results_summary.csv
  manifest_json: outputs/baselines/standard_frozen/baseline_manifest.json

budget:
  max_concurrent_gpu_jobs: 3
  max_gpu_hours_estimate: 24
  allow_submit: true

tasks:
  dev:
    - SciFact
    - NFCorpus
    - FiQA2018
    - SCIDOCS
  final:
    - SciFact
    - NFCorpus
    - SCIDOCS
    - FiQA2018
    - ArguAna
    - Touche2020
    - TRECCOVID

defaults:
  config: configs/preexp.yaml
  output_base: outputs/goal/runs
  eval_output_base: outputs/goal/eval
  eval_all_loops: false

experiments:
  - run_id: r010_tail_weighted_first_token_t10
    claim_track: standalone_main
    hypothesis: "Uniform loopwise supervision may over-constrain shallow loops; weighting deeper loops more heavily may preserve first-token gains while reducing cross-task drift."
    mechanism: "Train first-token memory with loopwise hard-negative losses weighted monotonically toward later loops, then evaluate loop_idx=10 globally on dev tasks."
    expected_effect: "Tests a middle ground between failed uniform loopwise and undertrained final-only first-token objectives without changing scoring inputs."
    version: loop_tail_weighted_first_token
    config: configs/goal_batch_010_tail_weighted_first_token.yaml
    eval_only: false
    candidate_rule: "Train loop_tail_weighted_first_token with loop_loss_gamma=1.25 for one full epoch and evaluate loop_idx=10 for every dev task; use no frozen-standard checkpoint, baseline ensemble, baseline concatenation, or interpolation in candidate scoring."
    expected_failure_modes:
      - "Tail weighting may still preserve the FiQA2018 and SCIDOCS regressions from first-token loops."
      - "Emphasizing late loops may reduce the SciFact and NFCorpus gains from uniform loopwise training."
    train:
      epochs: 1
      save_steps: 1000
      loop_loss_gamma: 1.25
    eval:
      task_names:
        - SciFact
        - NFCorpus
        - FiQA2018
        - SCIDOCS
      eval_all_loops: false
      loop_idx: 10
      candidate_loop_indices:
        - 10
    risk:
      level: medium
      reason: "Small training-objective change using only existing encoder parameters and candidate-only scoring; no metric, baseline, task set, or threshold change."
    estimated_gpu_hours: 10
    fallback: "Treat as standalone dev evidence only; do not make a final claim."

  - run_id: r010_consistency_first_token_t10
    claim_track: standalone_main
    hypothesis: "Adjacent-loop query embeddings may drift too far; a small candidate-only consistency penalty may stabilize transfer to FiQA2018 and SCIDOCS."
    mechanism: "Train first-token loopwise retrieval with a cosine adjacent-loop consistency penalty, then evaluate loop_idx=10 globally on dev tasks."
    expected_effect: "Directly tests loop-drift control while keeping the same model family, data, hard negatives, and candidate-only scoring."
    version: loop_consistency_first_token
    config: configs/goal_batch_010_consistency_first_token.yaml
    eval_only: false
    candidate_rule: "Train loop_consistency_first_token with loop_consistency_lambda=0.05 for one full epoch and evaluate loop_idx=10 for every dev task; use no frozen-standard checkpoint, baseline ensemble, baseline concatenation, or interpolation in candidate scoring."
    expected_failure_modes:
      - "The penalty may prevent useful refinement and flatten all dev scores."
      - "A fixed low penalty may be too weak to change the FiQA2018 regression pattern."
    train:
      epochs: 1
      save_steps: 1000
      loop_consistency_lambda: 0.05
    eval:
      task_names:
        - SciFact
        - NFCorpus
        - FiQA2018
        - SCIDOCS
      eval_all_loops: false
      loop_idx: 10
      candidate_loop_indices:
        - 10
    risk:
      level: medium
      reason: "Adds a small candidate-internal regularization term while preserving encoder-only training and standard NDCG@10 evaluation."
    estimated_gpu_hours: 10
    fallback: "Treat as standalone dev evidence only; do not make a final claim."

  - run_id: r010_self_residual_first_token_t7_a50
    claim_track: diagnostic
    hypothesis: "The batch_006 first-token checkpoint may contain useful late-loop signal but need candidate-internal anchoring to its own first-loop query embedding."
    mechanism: "Evaluation-only query embedding residual mix between the same candidate checkpoint's loop 1 and loop 7 query embeddings, with documents encoded by the same candidate checkpoint."
    expected_effect: "Tests candidate-only drift stabilization without any frozen-baseline scoring input."
    version: loop_matryoshka_first_token
    eval_only: true
    candidate_rule: "Use the batch_006 first-token checkpoint for every dev task; score with normalize(0.50 * candidate_loop1_query + 0.50 * candidate_loop7_query) against candidate document embeddings; use no frozen-baseline checkpoint, baseline ensemble, baseline concatenation, or interpolation in candidate scoring."
    expected_failure_modes:
      - "Candidate loop 1 may already be weaker than the frozen baseline and dilute the useful loop-7 signal."
      - "A global self-residual alpha may still leave FiQA2018 and SCIDOCS below baseline."
    eval:
      checkpoint_dir: outputs/goal/runs/batch_006_dev/r006_loop_matryoshka_first_token_t7/final
      task_names:
        - SciFact
        - NFCorpus
        - FiQA2018
        - SCIDOCS
      eval_all_loops: false
      loop_idx: 7
      self_query_alpha: 0.50
      self_query_source_loop: 1
      candidate_loop_indices:
        - 7
    risk:
      level: medium
      reason: "Evaluation-only candidate-internal query stabilization; close to fusion, but uses no frozen-baseline scoring input."
    estimated_gpu_hours: 4
    fallback: "Treat as diagnostic dev evidence only; do not make a final claim."
