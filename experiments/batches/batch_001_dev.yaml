batch_id: batch_001_dev
description: "Round 001 dev-only standard+loop weighted-concat fusion probes on four retrieval tasks."
created_by: codex
purpose: dev
primary_metric: ndcg_at_10
win_margin: 0.001

baseline:
  summary_csv: outputs/baselines/standard_frozen/results_summary.csv
  manifest_json: outputs/baselines/standard_frozen/baseline_manifest.json

budget:
  max_concurrent_gpu_jobs: 3
  max_gpu_hours_estimate: 18
  allow_submit: true

tasks:
  dev:
    - SciFact
    - NFCorpus
    - FiQA2018
    - SCIDOCS
  final:
    - SciFact
    - NFCorpus
    - SCIDOCS
    - FiQA2018
    - ArguAna
    - Touche2020
    - TRECCOVID

defaults:
  config: configs/preexp.yaml
  output_base: outputs/goal/runs
  eval_output_base: outputs/goal/eval
  eval_all_loops: false

experiments:
  - run_id: r001_fuse_loop_matryoshka_t2_a10
    hypothesis: "A small fixed standard+loop_matryoshka loop-2 fusion may improve dev-task NDCG@10 while retaining a strong standard component."
    mechanism: "Evaluation-only weighted concatenation of standard and loop checkpoint embeddings with loop-side alpha=0.10."
    expected_effect: "Small positive top-10 gains if loop depth 2 adds semantic refinement without query drift."
    version: loop_matryoshka
    eval_only: true
    eval:
      checkpoint_dir: outputs/final_grid_experiment/checkpoints/loop_matryoshka_mean_pool
      task_names:
        - SciFact
        - NFCorpus
        - FiQA2018
        - SCIDOCS
      eval_all_loops: false
      loop_idx: 2
      candidate_loop_indices:
        - 2
      fusion_standard_checkpoint_dir: outputs/final_grid_experiment/checkpoints/standard
      fusion_alpha: 0.10
    risk:
      level: low
      reason: "Evaluation-only, fixed shallow loop depth, fixed global fusion weight, and standard fallback is alpha=0."
    estimated_gpu_hours: 4
    fallback: "Discard this candidate and use the frozen standard baseline or alpha=0 fusion."

  - run_id: r001_fuse_loop_matryoshka_t3_a10
    hypothesis: "A small fixed standard+loop_matryoshka loop-3 fusion may add slightly deeper refinement than loop 2 without allowing post-hoc depth selection."
    mechanism: "Evaluation-only weighted concatenation of standard and loop checkpoint embeddings with loop-side alpha=0.10."
    expected_effect: "Potentially improves semantic retrieval on SciFact or FiQA2018 while testing drift risk on NFCorpus and SCIDOCS."
    version: loop_matryoshka
    eval_only: true
    eval:
      checkpoint_dir: outputs/final_grid_experiment/checkpoints/loop_matryoshka_mean_pool
      task_names:
        - SciFact
        - NFCorpus
        - FiQA2018
        - SCIDOCS
      eval_all_loops: false
      loop_idx: 3
      candidate_loop_indices:
        - 3
      fusion_standard_checkpoint_dir: outputs/final_grid_experiment/checkpoints/standard
      fusion_alpha: 0.10
    risk:
      level: low
      reason: "Evaluation-only, fixed loop depth, fixed global fusion weight, and no final-task claim from dev results."
    estimated_gpu_hours: 4
    fallback: "Discard this candidate and prefer loop-2 or frozen standard if loop-3 drift appears."

  - run_id: r001_fuse_loop_final_t2_a10
    hypothesis: "A small fixed standard+loop_final loop-2 fusion provides a low-risk contrast to loopwise supervision under the same standard-preserving fusion rule."
    mechanism: "Evaluation-only weighted concatenation of standard and loop checkpoint embeddings with loop-side alpha=0.10."
    expected_effect: "May improve top-10 results if final-only training produces complementary shallow query representations."
    version: loop_final
    eval_only: true
    eval:
      checkpoint_dir: outputs/final_grid_experiment/checkpoints/loop_final_mean_pool
      task_names:
        - SciFact
        - NFCorpus
        - FiQA2018
        - SCIDOCS
      eval_all_loops: false
      loop_idx: 2
      candidate_loop_indices:
        - 2
      fusion_standard_checkpoint_dir: outputs/final_grid_experiment/checkpoints/standard
      fusion_alpha: 0.10
    risk:
      level: low
      reason: "Evaluation-only, fixed shallow loop depth, fixed global fusion weight, and independent from the frozen baseline."
    estimated_gpu_hours: 4
    fallback: "Discard this candidate and use frozen standard or the loopwise-fusion candidates."
